<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravando...</title>
    <script>
      try {
        if (window.electronAPI && window.electronAPI.platform !== 'linux') {
          document.documentElement.classList.add('manual-drag');
        }
      } catch (_) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }
        body {
            color: white;
            font-family: "Source Code Pro", monospace;
            font-size: 13px;
            line-height: 1.5;
            user-select: none;
        }
        #wrap {
            background: rgba(30, 30, 30, 0.95);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            padding: 10px 14px 12px 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            min-height: 80px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            -webkit-app-region: drag;
            cursor: move;
            padding-right: 22px; /* espaço para o X */
            background: rgba(255, 255, 255, 0.01) !important;
            -webkit-user-select: none;
            user-select: none;
        }
        html.manual-drag .header { -webkit-app-region: no-drag !important; }
        .header > * { -webkit-app-region: no-drag; }

        .rec-dot {
            width: 10px;
            height: 10px;
            background: #ff4444;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        .rec-dot.done { background: #00cc66; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .header-text {
            font-size: 12px;
            color: #aaa;
            font-weight: 300;
        }

        .close-btn {
            position: absolute;
            top: 6px;
            right: 10px;
            background: none;
            border: none;
            color: #888;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
            -webkit-app-region: no-drag;
            width: 22px;
            height: 22px;
            line-height: 18px;
            padding: 0;
        }
        .close-btn:hover { color: #fff; }

        #turns { user-select: text; max-height: 540px; overflow-y: auto; }
        #turns::-webkit-scrollbar { width: 6px; }
        #turns::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        .turn {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 8px 0 4px 0;
        }
        .turn:first-child { border-top: none; padding-top: 2px; }

        .turn-num {
            font-size: 10px;
            color: #555;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .turn-user {
            color: #e0e0e0;
            font-size: 13px;
            line-height: 1.55;
            word-wrap: break-word;
            min-height: 18px;
        }
        .turn-user .partial { color: #888; font-style: italic; }
        .turn-user.final { color: #fff; }

        .turn-resp {
            display: none;
            position: relative;
            color: #00aaff;
            font-size: 13px;
            line-height: 1.55;
            word-wrap: break-word;
            margin-top: 6px;
            padding-left: 8px;
            border-left: 2px solid rgba(0,170,255,0.4);
            user-select: text;
            -webkit-user-select: text;
        }
        .turn-resp.corrected { color: #66d9a0; border-left-color: rgba(102,217,160,0.5); }

        .copy-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #ccc;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s;
            -webkit-app-region: no-drag;
        }
        .turn-resp:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
        .copy-btn.copied { background: rgba(102,217,160,0.25); color: #66d9a0; border-color: rgba(102,217,160,0.5); }

        .turn-badge {
            display: inline-block;
            font-size: 9px;
            color: #66d9a0;
            border: 1px solid rgba(102,217,160,0.4);
            border-radius: 3px;
            padding: 1px 4px;
            margin-left: 6px;
            vertical-align: middle;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .loading-dots {
            display: inline;
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }
    </style>
</head>
<body>
    <div id="wrap">
        <button class="close-btn" onclick="window.close()">×</button>

        <div class="header" draggable="false">
            <div class="rec-dot" id="rec-indicator"></div>
            <span class="header-text" id="header-label">Ouvindo...</span>
        </div>

        <div id="turns"></div>
    </div>

    <script>
        const turnsEl = document.getElementById('turns');
        const recIndicator = document.getElementById('rec-indicator');
        const headerLabel = document.getElementById('header-label');

        const turns = new Map(); // id -> { wrap, userEl, respEl, finalText }

        function escapeHtml(str) {
            return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function scrollToBottom() {
            try {
                turnsEl.scrollTop = turnsEl.scrollHeight;
                const h = Math.min(600, document.getElementById('wrap').scrollHeight + 8);
                if (window.electronAPI && window.electronAPI.resizeOverlay) {
                    window.electronAPI.resizeOverlay(h);
                }
            } catch (_) {}
        }

        // Cria nova bolha de turno
        window.startTurn = function(id, num) {
            if (turns.has(id)) return;
            const wrap = document.createElement('div');
            wrap.className = 'turn';
            wrap.dataset.turnId = id;
            wrap.innerHTML =
                '<div class="turn-num">Turno ' + num + '</div>' +
                '<div class="turn-user"></div>' +
                '<div class="turn-resp"></div>';
            turnsEl.appendChild(wrap);
            const t = {
                wrap,
                userEl: wrap.querySelector('.turn-user'),
                respEl: wrap.querySelector('.turn-resp'),
                finalText: '',
            };
            turns.set(id, t);
            recIndicator.classList.remove('done');
            headerLabel.textContent = 'Ouvindo...';
            scrollToBottom();
        };

        // Atualiza texto do user durante Vosk live (partial + final)
        window.updateTurn = function(id, text) {
            const t = turns.get(id);
            if (!t) return;
            t.userEl.innerHTML = '<span class="partial">' + escapeHtml(text) + '</span>';
            scrollToBottom();
        };

        // Trava texto final + mostra "pensando"
        window.markTurnFinal = function(id, text) {
            const t = turns.get(id);
            if (!t) return;
            t.finalText = text;
            t.userEl.classList.add('final');
            t.userEl.textContent = text;
            t.respEl.style.display = 'block';
            t.respEl.innerHTML = '🤖 Pensando<span class="loading-dots"></span>';
            headerLabel.textContent = 'Processando...';
            scrollToBottom();
        };

        // Substitui texto user pos-correcao do Whisper
        window.replaceTurnText = function(id, text) {
            const t = turns.get(id);
            if (!t) return;
            t.finalText = text;
            t.userEl.textContent = text;
            // badge visual de correcao
            if (!t.userEl.querySelector('.turn-badge')) {
                const badge = document.createElement('span');
                badge.className = 'turn-badge';
                badge.textContent = '✓ Whisper';
                t.userEl.appendChild(document.createTextNode(' '));
                t.userEl.appendChild(badge);
            }
            scrollToBottom();
        };

        // Mostra resposta da IA (isCorrected = true se veio do Whisper)
        window.showTurnResponse = function(id, resp, isCorrected) {
            const t = turns.get(id);
            if (!t) return;
            const text = resp || '(sem resposta)';
            t.respEl.style.display = 'block';
            t.respEl.classList.toggle('corrected', !!isCorrected);
            const prefix = isCorrected ? '🤖✨ ' : '🤖 ';
            t.respEl.textContent = prefix + text;
            // (re)injeta botão copy
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.textContent = 'copiar';
            btn.dataset.payload = text;
            btn.addEventListener('click', async (ev) => {
                ev.stopPropagation();
                try {
                    await navigator.clipboard.writeText(btn.dataset.payload);
                    btn.classList.add('copied');
                    btn.textContent = 'copiado ✓';
                    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'copiar'; }, 1500);
                } catch (e) {
                    btn.textContent = 'erro';
                    setTimeout(() => { btn.textContent = 'copiar'; }, 1500);
                }
            });
            t.respEl.appendChild(btn);
            recIndicator.classList.remove('done');
            headerLabel.textContent = 'Ouvindo...';
            scrollToBottom();
        };

        // Concatena texto de TODOS os turnos finalizados (compat com paste-on-stop)
        window.getTranscribedText = function() {
            return Array.from(turns.values())
                .map(t => t.finalText)
                .filter(Boolean)
                .join(' ');
        };

        // === DRAG MANUAL (Windows/macOS) ===
        // Linux usa o -webkit-app-region:drag do .header. Win/mac usa drag manual.
        document.addEventListener('dragstart', (e) => e.preventDefault());
        (function () {
            const api = window.electronAPI || {};
            const header = document.querySelector('.header');
            if (api.platform === 'linux' || !api.startWindowDrag || !header) return;
            header.style.cursor = 'move';
            header.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                if (e.target.closest('button, a, input, textarea')) return;
                e.preventDefault();
                api.startWindowDrag();
            });
            const end = () => api.endWindowDrag && api.endWindowDrag();
            window.addEventListener('mouseup', end);
            window.addEventListener('blur', end);
        })();
    </script>
</body>
</html>
