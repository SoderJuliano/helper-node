<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravando...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
        }
        body {
            color: white;
            font-family: "Source Code Pro", monospace;
            font-size: 13px;
            line-height: 1.5;
            user-select: none;
        }
        #wrap {
            background: rgba(30, 30, 30, 0.95);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            padding: 10px 14px 12px 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            min-height: 80px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            -webkit-app-region: drag;
            cursor: move;
            padding-right: 22px; /* espaço para o X */
        }
        .header > * { -webkit-app-region: no-drag; }

        .rec-dot {
            width: 10px;
            height: 10px;
            background: #ff4444;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        .rec-dot.done { background: #00cc66; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .header-text {
            font-size: 12px;
            color: #aaa;
            font-weight: 300;
        }

        .close-btn {
            position: absolute;
            top: 6px;
            right: 10px;
            background: none;
            border: none;
            color: #888;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
            -webkit-app-region: no-drag;
            width: 22px;
            height: 22px;
            line-height: 18px;
            padding: 0;
        }
        .close-btn:hover { color: #fff; }

        #live-text, #ai-response { user-select: text; }

        #live-text {
            color: #e0e0e0;
            font-size: 13px;
            line-height: 1.6;
            word-wrap: break-word;
            min-height: 30px;
        }

        #live-text .partial {
            color: #888;
            font-style: italic;
        }

        .separator {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 10px 0;
        }

        #ai-response {
            display: none;
            color: #00aaff;
            font-size: 13px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .loading-dots {
            display: inline;
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }
    </style>
</head>
<body>
    <div id="wrap">
        <button class="close-btn" onclick="window.close()">×</button>

        <div class="header">
            <div class="rec-dot" id="rec-indicator"></div>
            <span class="header-text" id="header-label">Ouvindo...</span>
        </div>

        <div id="live-text"></div>

        <hr class="separator" id="separator" style="display:none;">

        <div id="ai-response"></div>
    </div>

    <script>
        const liveText = document.getElementById('live-text');
        const aiResponse = document.getElementById('ai-response');
        const separator = document.getElementById('separator');
        const recIndicator = document.getElementById('rec-indicator');
        const headerLabel = document.getElementById('header-label');

        let finalizedText = '';

        // Called from main process
        window.appendPartial = function(text) {
            // Show finalized text + current partial in gray
            liveText.innerHTML = escapeHtml(finalizedText) +
                (finalizedText ? ' ' : '') +
                '<span class="partial">' + escapeHtml(text) + '</span>';
            scrollToBottom();
        };

        window.appendSentence = function(text) {
            finalizedText += (finalizedText ? ' ' : '') + text;
            liveText.textContent = finalizedText;
            scrollToBottom();
        };

        window.showLoading = function() {
            separator.style.display = 'block';
            aiResponse.style.display = 'block';
            aiResponse.innerHTML = '🤖 Pensando<span class="loading-dots"></span>';
            recIndicator.classList.add('done');
            headerLabel.textContent = 'Processando...';
            scrollToBottom();
        };

        window.showResponse = function(text) {
            separator.style.display = 'block';
            aiResponse.style.display = 'block';
            aiResponse.textContent = '🤖 ' + text;
            recIndicator.classList.add('done');
            headerLabel.textContent = 'Resposta';
            scrollToBottom();
        };

        window.getTranscribedText = function() {
            return finalizedText;
        };

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function scrollToBottom() {
            // Pede ao main para redimensionar a janela conforme o conteúdo cresce
            try {
                const h = Math.min(600, document.getElementById('wrap').scrollHeight + 8);
                if (window.electronAPI && window.electronAPI.resizeOverlay) {
                    window.electronAPI.resizeOverlay(h);
                }
            } catch (_) {}
        }
    </script>
</body>
</html>
