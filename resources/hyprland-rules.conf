# Helper Node — regras de janela para Hyprland
# Impede que a janela overlay apareça em gravações e compartilhamentos via
# xdg-desktop-portal (OBS, Google Meet, Microsoft Teams, ffmpeg pipewire).
#
# Como ativar:
#   Adicione ao seu hyprland.conf:
#     source = ~/.config/hypr/helper-node-rules.conf
#   Depois copie este arquivo:
#     cp /opt/helper-node/resources/hyprland-rules.conf ~/.config/hypr/helper-node-rules.conf
#   Recarregue: hyprctl reload

windowrulev2 = noblur, class:^(helper-node)$
windowrulev2 = noshadow, class:^(helper-node)$
windowrulev2 = noanim, class:^(helper-node)$
windowrulev2 = pin, class:^(helper-node)$
windowrulev2 = float, class:^(helper-node)$

# As linhas abaixo se aplicam especificamente à janela overlay stealth
# (título contém "overlay" ou a janela é do tipo toolbar/utility).
# "nofocus" impede que o xdg-desktop-portal inclua esta janela nas capturas.
windowrulev2 = nofocus, class:^(helper-node)$, floating:1
windowrulev2 = noinitialfocus, class:^(helper-node)$, floating:1
