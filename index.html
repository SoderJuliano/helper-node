                    pre.textContent = JSON.stringify(debugInfo, null, 2);
                    transcriptionElement.appendChild(pre);
                    scrollTranscriptionToBottom();
                    
                    return; // Finaliza a execução aqui para o modo debug
                }

                appendQuestionEntry(text);
            });

            window.electronAPI.onTranscriptionError((message) => {
                robot.style.display = 'none';
                
                // Ignora erros de cancelamento (não exibe na tela)
                if (message === 'Request cancelled') {
                    console.log('Request cancelled by user - this is expected');
                    return;
                }
                
                console.error('Erro na transcrição:', message);
                
                // Só mostra erro na tela se não for um cancelamento
                if (currentQuestionElement) {
                    // Se já tem pergunta, adiciona erro após ela
                    const errorMsg = document.createElement('p');
                    errorMsg.style.color = '#ff6b6b';
                    errorMsg.textContent = `Erro: ${message}`;
                    document.getElementById('transcription').appendChild(errorMsg);
                } else {
                    // Se não tem pergunta, substitui o conteúdo
                    document.getElementById('transcription').innerText = `Erro: ${message}`;
                }
            });

            window.electronAPI.onIaResponse((response) => {
                console.log('IA respondeu:', response);
                if (!response) {
                    document.getElementById('robot').style.display = 'none';
                    console.error('Resposta é undefined ou vazia');
                    return;
                }

                if (window.historySession) {
                    window.historySession.addMessageToCurrentSession('assistant', response);
                }

                const transcriptionElement = document.getElementById('transcription');
                const newResponse = document.createElement('div');
                newResponse.classList.add('ia-response');
                
                // Check if response is already HTML (has <pre> or <code> tags) or plain markdown text
                const isAlreadyHTML = /<pre|<code/.test(response);
                
                if (isAlreadyHTML) {
                    // Response is already formatted HTML (from Gemini or old Llama)
                    newResponse.innerHTML = response;
                } else {
                    // Response is plain markdown text (from Backend), format it like OpenAI
                    const formattedResponse = formatOpenAIResponse(response);
                    newResponse.innerHTML = formattedResponse;
                }

                // O espaçamento é feito via CSS (margin-top: 20px na .ia-response)
                transcriptionElement.appendChild(newResponse);

                document.getElementById('robot').style.display = 'none';

                // Adiciona o botão "Copiar Tudo"
                const copyAllButton = document.createElement('button');
                copyAllButton.textContent = 'Copy All';
                copyAllButton.classList.add('copy-all-button');
                newResponse.appendChild(copyAllButton);

                // Scroll suave para o fim
                setTimeout(() => scrollTranscriptionToBottom('smooth'), 100);

            });

            window.electronAPI.onOpenAIResponse((response) => {
                console.log('OpenAI respondeu:', response);
                if (!response) {
                    document.getElementById('robot').style.display = 'none';
                    console.error('Resposta da OpenAI é undefined ou vazia');
                    return;
                }

                if (window.historySession) {
                    window.historySession.addMessageToCurrentSession('assistant', response);
                }

                const transcriptionElement = document.getElementById('transcription');
                const newResponse = document.createElement('div');
                newResponse.classList.add('ia-response');
                
                const formattedResponse = formatOpenAIResponse(response);
                newResponse.innerHTML = formattedResponse;

                transcriptionElement.appendChild(newResponse);

                document.getElementById('robot').style.display = 'none';

                // Scroll suave para o fim
                setTimeout(() => scrollTranscriptionToBottom('smooth'), 100);

            });

            window.electronAPI.onOcrResult(({ text, screenshotPath, base64Image, error }) => {
                const preview = document.getElementById('screenshot-preview');
                const robot = document.getElementById('robot');
                const animationContainer = document.getElementById('animation-container');
                const transcriptionElement = document.getElementById('transcription');

                // Esconde outros elementos de carregamento
                animationContainer.style.display = 'none';
                
                // Se houve erro no OCR, exibir mensagem de erro
                if (error) {
                    console.warn('OCR Error:', error);
                    robot.style.display = 'none';
                    
                    if (manualInputActive) {
                        // Se estamos em input manual, apenas logar o erro
                        console.log('OCR error in manual input mode, continuing...');
                        return;
                    }
                    
                    // Mostrar mensagem de erro apenas se não estivermos em input manual
                    const errorMsg = document.createElement('p');
                    errorMsg.style.color = '#ff6b6b';
                    errorMsg.textContent = `Erro no OCR: ${error}`;
                    transcriptionElement.appendChild(errorMsg);
                    scrollTranscriptionToBottom();
                    return;
                }

                // Mostra a miniatura (use base64 if provided)
                if (base64Image) {
                    preview.src = base64Image;
                } else if (screenshotPath) {
                    preview.src = `file://${screenshotPath}`;
                }
                preview.style.display = 'block';

                // Se input manual está ativo, não envia nada ainda; apenas guarda e mostra
                if (manualInputActive) {
                    pastedImageForManualInput = base64Image || (`file://${screenshotPath}`);
                    robot.style.display = 'none';
                    // Insere o texto OCR no início do textarea
                    const textarea = document.querySelector('.edit-textarea');
                    if (textarea && text) {
                        const existingText = textarea.value;
                        textarea.value = text + '\n' + existingText;
                        textarea.focus();
                        // Posiciona o cursor no final do texto existente (após a quebra de linha)
                        const cursorPos = text.length + 1 + existingText.length;
                        textarea.setSelectionRange(cursorPos, cursorPos);
                    }
                    return;
                }

                robot.style.display = 'block';
                // Alinhar à esquerda para transcrições de imagem
                transcriptionElement.classList.add('ocr-left');

                // --- START MODIFICATION ---
                // If there's an existing question (from paste event "Image in context"), append to it
                if (currentQuestionElement && currentQuestionElement.textContent.includes("Image in context")) {
                    let combinedText = currentQuestionElement.textContent.replace('✏️', '').trim(); // Get current text from the question span
                    // Add the OCR text, potentially on a new line for clarity
                    combinedText += `\n${text}`; 
                    
                    currentQuestionElement.textContent = combinedText; // Update the question span
                    const editIcon = document.createElement('span'); // Re-add edit icon
                    editIcon.className = 'edit-icon';
                    editIcon.textContent = '✏️';
                    currentQuestionElement.appendChild(editIcon);
                    
                    sentToAI(text || 'Processo texto da imagem');
                    
                    setTimeout(() => {
                        preview.style.display = 'none';
                    }, 8000);
                    
                    return;
                }

                // Detectar conteúdo HTML/CSS e renderizar como bloco de código
                const hasHtmlTags = /<\/?[a-zA-Z][^>]*>/m.test(text || '');
                const hasCssBraces = /\{[\s\S]*\}/m.test(text || '');
                const ocrContainer = document.createElement('div');
                ocrContainer.className = 'ia-response';
                
                if (text && (hasHtmlTags || hasCssBraces)) {
                    const pre = document.createElement('pre');
                    const code = document.createElement('code');
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-button';

        function formatStreamedText(text) {
            if (!text) return '';
            
            console.log('formatStreamedText input length:', text.length);
            console.log('formatStreamedText input preview:', text.substring(0, 200));
            
            // Escape HTML
            const escapeHTML = (str) => {
                return str
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            };

            let formatted = text;
            const codeBlocks = [];
            
            // Primeiro, captura e protege blocos de código multiline (```)
            const codeBlockMatches = formatted.match(/```\s*(\w+)?\s*\n?([\s\S]*?)\n?\s*```/g);
            console.log('Code blocks found (```):', codeBlockMatches ? codeBlockMatches.length : 0);
            
            formatted = formatted.replace(/```\s*(\w+)?\s*\n?([\s\S]*?)\n?\s*```/g, (match, lang, code) => {
                const placeholder = `__CODE_BLOCK_${codeBlocks.length}__`;
                const codeId = `stream-code-${Date.now()}-${codeBlocks.length}`;
                codeBlocks.push(
                    `<pre><button class="copy-button" data-code-id="${codeId}" title="Copiar"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button><code id="${codeId}" class="language-${lang || 'text'}">${escapeHTML(code.trim())}</code></pre>`
                );
                console.log('Added code block', codeBlocks.length - 1, 'with language:', lang || 'text');
                return placeholder;
            });
            
            // Captura blocos de código com crase simples e quebras de linha (multilinha sem linguagem)
            // Procura por: ` (quebra de linha) código (quebra de linha) `
            const singleBacktickMatches = formatted.match(/`\s*\n([\s\S]*?)\n\s*`/g);
            console.log('Single backtick blocks found:', singleBacktickMatches ? singleBacktickMatches.length : 0);
            
            formatted = formatted.replace(/`\s*\n([\s\S]*?)\n\s*`/g, (match, code) => {
                const placeholder = `__CODE_BLOCK_${codeBlocks.length}__`;
                const codeId = `stream-code-${Date.now()}-${codeBlocks.length}`;
                codeBlocks.push(
                    `<pre><button class="copy-button" data-code-id="${codeId}" title="Copiar"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button><code id="${codeId}" class="language-text">${escapeHTML(code.trim())}</code></pre>`
                );
                console.log('Added single backtick code block', codeBlocks.length - 1);
                return placeholder;
            });
            
            // Captura código inline (`codigo`)
            const inlineCodeMatches = formatted.match(/`([^`\n]+)`/g);
            console.log('Inline code found:', inlineCodeMatches ? inlineCodeMatches.length : 0);
            
            formatted = formatted.replace(/`([^`\n]+)`/g, (match, code) => {
                return `<code style="background-color: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 3px; font-family: 'Courier New', monospace;">${escapeHTML(code)}</code>`;
            });
            
            // Negrito
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // Itálico (evita conflito com **)
            formatted = formatted.replace(/(?<!\*)\*([^\*]+)\*(?!\*)/g, '<em>$1</em>');
            
            // Quebras de linha duplas = parágrafo
            formatted = formatted.replace(/\n\n/g, '</p><p>');
            
            // Quebras de linha simples = <br>
            formatted = formatted.replace(/\n/g, '<br>');
            
            // Envolve em parágrafo se não tiver
            if (!formatted.startsWith('<p>')) {
                formatted = '<p>' + formatted + '</p>';
            }
            
            // Restaura blocos de código
            console.log('Restoring', codeBlocks.length, 'code blocks');
            codeBlocks.forEach((block, index) => {
                formatted = formatted.replace(`__CODE_BLOCK_${index}__`, block);
            });
            
            console.log('formatStreamedText output length:', formatted.length);
            console.log('formatStreamedText output preview:', formatted.substring(0, 300));
            
            return formatted;
        }

        function handleQuestionEdit(questionSpan) {
            if (isEditingQuestion) return;
            
            isEditingQuestion = true;
            console.log('Iniciando edição da pergunta');
            
            // Cancela a requisição da IA se estiver em andamento
            window.electronAPI.cancelIaRequest();
            
            // Para as animações e notificações
            stopProcessing();
            
            const currentText = questionSpan.textContent.replace('✏️', '').trim();
            console.log('Texto atual:', currentText);
            
            const container = document.createElement('div');
            container.className = 'edit-container';
            
            // Sempre usa textarea para edição
            const editField = document.createElement('textarea');
            editField.className = 'edit-textarea';
            editField.rows = 5;
            editField.value = currentText;
            editField.style.width = '100%';
            editField.style.marginBottom = '10px';
            
            const sendButton = document.createElement('button');
            sendButton.className = 'send-button';
            sendButton.textContent = 'Enviar';
            sendButton.style.marginRight = '10px';
            
            container.appendChild(editField);
            container.appendChild(sendButton);
            
            // Event listener para o botão
            sendButton.addEventListener('click', function() {
                console.log('Botão enviar clicado');
                const newText = editField.value.trim();
                if (newText) {
                    finishEdit(newText, container);
                }
            });
            
            // Event listener para as teclas
            editField.addEventListener('keydown', function(e) {
                console.log('Tecla pressionada:', e.key, 'Shift:', e.shiftKey);
                if (e.key === 'Escape') {
                    e.preventDefault();
                    console.log('Cancelando edição');
                    cancelEditSimple(questionSpan, container, currentText);
                } else if (e.key === 'Enter' && e.shiftKey) {
                    e.preventDefault();
                    console.log('Shift+Enter pressionado');
                    const newText = editField.value.trim();
                    if (newText) {
                        finishEdit(newText, container);
                    }
                }
            });

            // Substitui o span pelo campo de edição
            questionSpan.replaceWith(container);
            editField.focus();
            console.log('Campo de edição criado e focado');
        }

        function cancelEditSimple(originalSpan, container, originalText) {
            console.log('Cancelando edição, texto original:', originalText);
            isEditingQuestion = false;
            
            // Recria o span original
            originalSpan.textContent = originalText;
            const editIcon = document.createElement('span');
            editIcon.className = 'edit-icon';
            editIcon.textContent = '✏️';
            originalSpan.appendChild(editIcon);
            
            // Reativa o evento de clique
            originalSpan.addEventListener('click', () => handleQuestionEdit(originalSpan));
            
            // Substitui de volta
            container.replaceWith(originalSpan);
            console.log('Edição cancelada, span restaurado');
        }

        function finishEdit(newText, container) {
            console.log('Finalizando edição com texto:', newText);
            
            isEditingQuestion = false;
            
            // Limpa qualquer elemento de streaming anterior
            const transcriptionElement = document.getElementById('transcription');
            const existingStreamingElements = transcriptionElement.querySelectorAll('.streaming-response, .response-text');
            existingStreamingElements.forEach(el => el.remove());

            streamingText = '';
            typingCursor = null;

        function openManualInput(initialText = '') {
            if (manualInputActive || isEditingQuestion) {
                // Se ja esta ativo, apenas garante o foco no input
                const existingInput = document.querySelector('.manual-input-container .terminal-input');
                if (existingInput) {
                    existingInput.focus();
                    if (initialText) {
                        const start = existingInput.selectionStart;
                        const end = existingInput.selectionEnd;
                        existingInput.setRangeText(initialText, start, end, 'end');
                        existingInput.dispatchEvent(new Event('input'));
                    }
                }
                return;
            }
            
            manualInputActive = true;
            pastedImageForManualInput = null; // Reseta a imagem colada
            document.getElementById('screenshot-preview').style.display = 'none'; // Esconde o preview
            
            const transcriptionElement = document.getElementById('transcription');
            removeManualInputContainer();
            
            const container = document.createElement('div');
            container.className = 'edit-container manual-input-container';

            // Wrap estilo terminal: '>' antes + textarea com caret verde + '_' piscando quando vazio.
            const wrap = document.createElement('div');
            wrap.className = 'terminal-input-wrap';

            // Cursor decorativo: pisca quando o textarea esta vazio.
            const cursor = document.createElement('span');
            cursor.className = 'terminal-cursor';
            cursor.textContent = '_';

            // Dica curta ao lado do cursor (some quando user digita).
            const hint = document.createElement('span');
            hint.className = 'terminal-hint';
            hint.textContent = 'digite sua pergunta — Shift+Enter envia · Esc fecha';

            const inputField = document.createElement('textarea');
            inputField.className = 'terminal-input';
            inputField.rows = 1;
            inputField.placeholder = '';
            if (initialText) inputField.value = initialText;

            // Toggle visibilidade do _ + auto-grow.
            const syncGhost = () => {
                if (inputField.value.length > 0) {
                    wrap.classList.add('has-text');
                } else {
                    wrap.classList.remove('has-text');
                }
                inputField.style.height = 'auto';
                inputField.style.height = Math.min(inputField.scrollHeight, 200) + 'px';
            };
            inputField.addEventListener('input', syncGhost);

            wrap.appendChild(cursor);
            wrap.appendChild(hint);
            wrap.appendChild(inputField);
            container.appendChild(wrap);
            
            const controls = document.createElement('div');
            controls.className = 'edit-controls';
            
            const sendButton = document.createElement('button');
            sendButton.className = 'send-button';
            sendButton.textContent = 'Enviar';
            sendButton.onclick = () => {
                const question = inputField.value.trim();
                if (question || pastedImageForManualInput) {
                    submitManualQuestion(question, container);
                }
            };
            
            controls.appendChild(sendButton);
            container.appendChild(controls); // Append controls to container
            
            transcriptionElement.appendChild(container);
            scrollTranscriptionToBottom();
            // Sincroniza ghost no init (vazio ou com initialText) pra cursor aparecer.
            syncGhost();
            
            // Foca no input com um pequeno delay para garantir que o DOM foi atualizado
            setTimeout(() => {
                inputField.focus();
                if (initialText) {
                    const pos = inputField.value.length;
                    inputField.setSelectionRange(pos, pos);
                }
            }, 100);
            
            // Enter quebra linha, Shift+Enter envia
            inputField.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    e.preventDefault(); // Previne comportamento padrão
                    e.stopPropagation(); // Evita que o evento se propague
                    manualInputActive = false;
                    container.remove();
                    pastedImageForManualInput = null; // Limpa a imagem
                    document.getElementById('screenshot-preview').style.display = 'none'; // Esconde o preview
                } else if (e.key === 'Enter' && e.shiftKey) {
                    e.preventDefault(); // Previne nova linha no textarea
                    const question = inputField.value.trim();
                    if (question || pastedImageForManualInput) {
                        submitManualQuestion(question, container);
                    }
                }
                // Enter sozinho não precisa de handler, deixa o comportamento padrão (quebra linha)
            });
        }
        
        async function submitManualQuestion(text, container) {
            manualInputActive = false;

            const isDebug = await window.electronAPI.getDebugModeStatus();

            if (pastedImageForManualInput) {
                // We already processed image OCR in main and will send combined prompt here
                // Show the question in UI
                const questionSpan = document.createElement('span');
                questionSpan.className = 'question-text';
                questionSpan.textContent = `${text} (Image in context)`;
                container.replaceWith(questionSpan);
                currentQuestionElement = questionSpan;

                startProcessing();

                // Fetch promptInstruction and send combined
                const promptInstruction = await window.electronAPI.getPromptInstruction();
                const combined = `${promptInstruction}${text}`; // OCR text will be appended by backend flow or renderer when received
                // If we kept OCR text locally, append it
                if (typeof window.lastOcrText === 'string' && window.lastOcrText.length > 0) {
                    sentToAI(`${promptInstruction}${text}\n${window.lastOcrText}`);
                } else {
                    sentToAI(combined);
                }
                pastedImageForManualInput = null;
                document.getElementById('screenshot-preview').style.display = 'none';
                return;
            }

            // Existing debug/plain flows remain unchanged
            if (isDebug) {
                const promptInstruction = await window.electronAPI.getPromptInstruction();
                const backendUrl = (await window.electronAPI.getBackendUrl()) || "URL_INDEFINIDA";
                //console.log("DEBUG backend URL:", backendUrl);
                const lang = await window.electronAPI.getLanguage();
                const map = {
                    'pt-br': 'PORTUGUESE',
                    'en-us': 'ENGLISH'
                };
                const debugInfo = {
                    'HTTP Verb': 'POST',
                    'Backend URL': backendUrl,
                    'Request Body': {
                        newPrompt: `${promptInstruction}${text}`,
                        ip: sessionStorage.getItem("user_ip"),
                        email: 'julianosoder.js@gmail.com',
                        agent: false,
                        language: map[lang] || 'ENGLISH'
                    }
                };
                
                const pre = document.createElement('pre');
                pre.textContent = JSON.stringify(debugInfo, null, 2);
                container.replaceWith(pre);

            } else {
                // Cria o span com a pergunta
                const questionSpan = document.createElement('span');
                questionSpan.className = 'question-text';
                questionSpan.textContent = text;
                
                const editIcon = document.createElement('span');
                editIcon.className = 'edit-icon';
                editIcon.textContent = '✏️';
                questionSpan.appendChild(editIcon);
                
                questionSpan.addEventListener('click', () => handleQuestionEdit(questionSpan));
                
                container.replaceWith(questionSpan);
                currentQuestionElement = questionSpan;
            }
            
            // Inicia processamento
            startProcessing();
            
            // Envia para a IA
            sentToAI(text);
        }

        window.electronAPI.onOcrResult(({ text }) => { window.lastOcrText = text || ''; });
