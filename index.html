<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicação Electron</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: rgba(30, 30, 30, 0.8);
            color: white;
            font-family: "Source Code Pro", monospace;
            font-optical-sizing: auto;
            font-weight: regular;
            font-style: normal;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
        }
        
        h1 {
            font-size: 3rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: opacity 0.5s ease;
            animation: pulse 2s infinite;
            position: absolute;
            top: 10%;
            left: 30%;
            right: 30%;
        }
        
        .commands {
            position: absolute;
            top: 35px;
            left: 10px;
            width: 260px;
            text-align: start;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transform: translateX(-10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .commands.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
        }

        .panel {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 8px;
            border-radius: 5px;
            overflow: hidden;
            max-height: 220px;
            transform-origin: top;
            transition: max-height 0.2s ease, padding-top 0.2s ease, padding-bottom 0.2s ease;
            position: relative;
        }

        .panel.collapsed {
            max-height: 18px;
            padding-top: 8px;
            padding-bottom: 4px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 2px;
            min-height: 12px;
            color: #ffffff;
            user-select: none;
            cursor: pointer;
            -webkit-app-region: no-drag;
            padding: 2px 4px;
            border-radius: 4px;
            transition: background-color 0.15s ease;
        }

        .panel-header:hover {
            background-color: rgba(255, 255, 255, 0.06);
        }

        .panel-label {
            white-space: nowrap;
        }

        .panel-filler {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }

        .panel-item {
            padding: 4px 0;
            cursor: pointer;
            color: #e0e0e0;
            transition: color 0.2s, text-shadow 0.2s;
            font-size: 9px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 240px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-item:hover {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        .panel-item-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .panel-item-delete {
            flex-shrink: 0;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 10px;
            padding: 0;
            width: 12px;
            height: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
            transition: opacity 0.2s, color 0.2s;
        }

        .panel-item:hover .panel-item-delete {
            opacity: 1;
            color: #ff6b6b;
        }

        .panel-item-delete:hover {
            color: #ff6b6b;
        }

        .new-chat-btn {
            padding: 4px 6px;
            margin-top: 4px;
            background-color: rgba(76, 175, 80, 0.7);
            border: 1px solid rgba(76, 175, 80, 1);
            color: #ffffff;
            border-radius: 3px;
            cursor: pointer;
            font-size: 9px;
            transition: background-color 0.2s;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .new-chat-btn:hover {
            background-color: rgba(76, 175, 80, 1);
        }

        #conversation-viewer {
            position: fixed;
            top: 20%;
            left: 10%;
            right: 10%;
            max-height: 60vh;
            background-color: #101418;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            padding: 36px 20px 20px;
            overflow: visible;
            color: #e0e0e0;
            font-size: 11px;
            line-height: 1.6;
            display: none;
            z-index: 5000;
        }
        #conversation-content {
            max-height: calc(60vh - 60px);
            overflow-y: auto;
            scrollbar-width: thin;
        }

        #conversation-viewer::-webkit-scrollbar {
            width: 6px;
        }

        #conversation-viewer::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        #conversation-viewer::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        .conversation-close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
            transition: opacity 0.2s;
            z-index: 5100;
            pointer-events: auto;
        }

        .conversation-close-btn:hover {
            opacity: 1;
        }

        .conversation-download-btn {
            position: absolute;
            top: 8px;
            right: 34px;
            background: transparent;
            border: none;
            color: #ffffff;
            cursor: pointer;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
            transition: opacity 0.2s, color 0.2s;
        }

        .conversation-download-btn:hover {
            opacity: 1;
            color: #81c784;
        }

        .conversation-download-btn svg {
            width: 14px;
            height: 14px;
            display: block;
            pointer-events: none;
        }

        /* Toast in-app (modo stealth = sem notificacao do SO) */
        #app-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a2028;
            border: 1px solid rgba(129, 199, 132, 0.5);
            color: #e8f5e9;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 11px;
            font-family: 'Source Code Pro', monospace;
            max-width: 70%;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 99999;
            white-space: pre-wrap;
            word-break: break-all;
        }

        #app-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        #app-toast.error {
            border-color: rgba(239, 83, 80, 0.6);
            color: #ffebee;
        }

        .conversation-message {
            margin-bottom: 12px;
            padding: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            border-left: 2px solid rgba(76, 175, 80, 0.5);
            border-radius: 4px;
        }

        .conversation-message.user {
            border-left-color: rgba(33, 150, 243, 0.5);
        }

        .conversation-message.assistant {
            border-left-color: rgba(76, 175, 80, 0.5);
        }

        .conversation-message-label {
            font-weight: bold;
            color: #90caf9;
            margin-bottom: 2px;
        }

        .conversation-message.assistant .conversation-message-label {
            color: #81c784;
        }

        .conversation-message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            text-align: left;
        }

        .commands-content {
            max-height: 190px;
            opacity: 1;
            transform: translateY(0);
            transition: max-height 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
        }

        .panel.collapsed .commands-content {
            max-height: 0;
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none;
        }

        .commands-toggle {
            position: static;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            padding: 0;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.75);
            cursor: pointer;
            z-index: 2;
            -webkit-app-region: no-drag;
            transition: transform 0.2s ease, color 0.15s ease;
        }

        .commands-toggle:hover {
            color: #ffffff;
        }

        .commands-toggle svg {
            width: 12px;
            height: 12px;
            display: block;
            pointer-events: none;
        }

        /* Rotaciona o chevron quando expandido (panel sem 'collapsed') */
        .panel:not(.collapsed) .commands-toggle {
            transform: rotate(180deg);
        }
        
        .command-item {
            margin: 5px 0;
        }

        .command-item strong {
            color: #81c784;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        
        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        #animation-container {
            position: fixed;
            top: 40px;
            right: 30px;
            width: 60px;
            height: 60px;
            display: none; /* Começa escondido */
            z-index: 9999; /* Sobre todos os outros elementos */
            pointer-events: none; /* Não bloqueia clique no que está atrás */
            opacity: 0.95;
        }

        .drag-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            -webkit-app-region: drag;
            z-index: 1001;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #transcription {
            max-width: 80%;
            min-width: 500px;
            top: calc(8% + 15px);
            bottom: 5%;
            left: 10%;
            right: 10%;
            padding: 12px 20px;
            position: fixed;
            color: white;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        /* Hide scrollbar visuals while allowing scroll */
        #transcription::-webkit-scrollbar {
            width: 0;
            height: 0;
            background: transparent;
        }

        #transcription:hover {
            overflow-y: auto; /* keep consistent on hover */
            overflow-x: hidden;
            scrollbar-width: none; /* Firefox */
        }

        .content:hover {
            overflow-y: auto; /* Permite rolagem vertical */
            overflow-x: hidden; /* Impede rolagem horizontal */
            scrollbar-width: none; /* Firefox */
        }

        #transcription:hover::-webkit-scrollbar {
            width: 0; /* Oculta barra em navegadores WebKit */
            height: 0;
        }

        /* Remover estilos de thumb e track, já que a barra está oculta */
        #transcription:hover::-webkit-scrollbar-thumb {
            display: none;
        }

        #transcription:hover::-webkit-scrollbar-track {
            display: none;
        }

        #transcription pre {
            text-align: left;
            max-width: 100%;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 5px;
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: #4a4a52 transparent;
        }

        .content {
            display: block;
            width: 100%;
            overflow-wrap: break-word;
        }

        .rt-assistant-feed {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
            text-align: left;
        }

        .rt-bubble {
            max-width: 88%;
            border-radius: 14px;
            line-height: 1.55;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            word-break: break-word;
        }

        /* Bolha de transcrição (azul) — collapsible */
        .rt-bubble.user {
            align-self: flex-end;
            background: rgba(33, 150, 243, 0.18);
            border: 1px solid rgba(33, 150, 243, 0.40);
            overflow: hidden;
        }

        .rt-bubble.user .rt-bubble-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            cursor: pointer;
            user-select: none;
            font-size: 12px;
            font-weight: 500;
            color: rgba(144, 202, 249, 0.95);
            gap: 8px;
        }

        .rt-bubble.user .rt-bubble-header:hover {
            background: rgba(33, 150, 243, 0.12);
        }

        .rt-bubble.user .rt-bubble-toggle {
            font-size: 10px;
            opacity: 0.7;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }

        .rt-bubble.user .rt-bubble-toggle.open {
            transform: rotate(180deg);
        }

        .rt-bubble.user .rt-bubble-body {
            display: none;
            padding: 0 12px 10px 12px;
            font-size: 12.5px;
            color: rgba(220, 235, 255, 0.88);
            white-space: pre-wrap;
            border-top: 1px solid rgba(33, 150, 243, 0.20);
        }

        .rt-bubble.user .rt-bubble-body.open {
            display: block;
        }

        /* Bolha de resposta da IA (verde) */
        .rt-bubble.assistant {
            align-self: flex-start;
            background: rgba(76, 175, 80, 0.16);
            border: 1px solid rgba(76, 175, 80, 0.38);
            padding: 10px 14px;
            font-size: 13px;
            color: rgba(220, 255, 220, 0.92);
            white-space: pre-wrap;
        }

        .rt-bubble.system {
            align-self: center;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #aaa;
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 8px;
        }

        .rt-bubble.fatal-error {
            align-self: center;
            background: rgba(244, 67, 54, 0.20);
            border: 1px solid rgba(244, 67, 54, 0.60);
            color: #ff8a80;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            max-width: 95%;
            padding: 10px 14px;
        }

        #transcription br {
            margin-bottom: 10px;
        }

        .icon {
            position: absolute;
            top: 40px;
            right: 30px;
            width: 60px;
            height: 60px;
            display: none;
            z-index: 1000;
        }


        .ia-response {
            font-family: "Source Code Pro", monospace;
            font-optical-sizing: auto;
            font-weight: 500;
            font-size: 16px;
            line-height: 1.8;
            overflow-wrap: break-word;
            margin-top: 4px;
        }

        /* Agrupa pergunta + resposta numa unidade visual com hover elevation */
        .interaction-block {
            position: relative;
            border-radius: 8px;
            padding: 6px 8px;
            margin-top: 30px;
            transition: background 0.2s;
        }
        .interaction-block:first-child {
            margin-top: 0;
        }
        .interaction-block:hover {
            background: rgba(255,255,255,0.04);
        }
        /* === Botão ⌬ para esconder/mostrar painéis === */
        #panels-toggle-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.35);
            font-size: 28px;
            cursor: pointer;
            padding: 2px 5px;
            border-radius: 4px;
            z-index: 1100;
            transition: color 0.15s, background 0.15s;
            -webkit-app-region: no-drag;
            display: flex;
            align-items: center;
        }
        #panels-toggle-btn:hover {
            color: rgba(255,255,255,0.85);
            background: rgba(255,255,255,0.08);
        }

        /* === Copy All fixo no topo da transcrição === */
        #transcription-header {
            position: fixed;
            top: calc(8% + 15px);
            right: 10%;
            z-index: 50;
            display: flex;
            justify-content: flex-end;
        }
        .copy-all-fixed-btn {
            display: none;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            font-family: monospace;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
        }
        .copy-all-fixed-btn:hover {
            color: rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.08);
        }
        .copy-all-fixed-btn.copied {
            color: #81c784;
        }

        /* === Botão Copiar dentro de cada interaction-block === */
        .interaction-block .copy-interaction-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: transparent;
            border: none;
            border-radius: 4px;
            padding: 3px 7px;
            cursor: pointer;
            font-size: 10px;
            color: rgba(255,255,255,0);
            font-family: monospace;
            transition: all 0.15s ease;
            z-index: 3;
            pointer-events: none;
        }
        .interaction-block:hover .copy-interaction-btn {
            color: rgba(255,255,255,0.45);
            pointer-events: auto;
        }
        .interaction-block:hover .copy-interaction-btn:hover {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.9);
        }

        /* Lista de arquivos editados horizontalmente */
        .tool-files-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 6px 0 2px 0;
        }
        .tool-file-chip {
            font-size: 11px;
            background: rgba(0,200,120,0.12);
            color: rgba(160,255,200,0.85);
            border: 1px solid rgba(0,200,120,0.2);
            border-radius: 4px;
            padding: 2px 7px;
            font-family: monospace;
        }

        .ia-response pre {
            position: relative;
            text-align: start;
            color: #e0e0e0; /* Corrigido para texto claro */
            background: #2d2d2d; /* Fundo um pouco mais escuro para contraste */
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto; /* Permite rolagem horizontal para código longo */
            max-width: 100%;
            box-sizing: border-box;
            margin: 8px 0;
            font-family: 'Courier New', monospace; /* Fonte específica para código */
            scrollbar-width: thin;
            scrollbar-color: #4a4a52 transparent;
        }

        /* Scrollbar custom dentro de blocos de codigo (substitui a branca grossa do Chromium). */
        .ia-response pre::-webkit-scrollbar,
        #transcription pre::-webkit-scrollbar {
            height: 6px;
            width: 6px;
            background: transparent;
        }
        .ia-response pre::-webkit-scrollbar-track,
        #transcription pre::-webkit-scrollbar-track {
            background: transparent;
        }
        .ia-response pre::-webkit-scrollbar-thumb,
        #transcription pre::-webkit-scrollbar-thumb {
            background: #3a3a42;
            border-radius: 3px;
            transition: background 0.2s;
        }
        .ia-response pre:hover::-webkit-scrollbar-thumb,
        #transcription pre:hover::-webkit-scrollbar-thumb {
            background: #5a5a62;
        }
        .ia-response pre::-webkit-scrollbar-corner,
        #transcription pre::-webkit-scrollbar-corner {
            background: transparent;
        }

        .ia-response code {
            position: relative;
            text-align: start;
            color: #e0e0e0; /* Corrigido para texto claro */
            font-family: 'Courier New', monospace;
            display: inline;
            white-space: normal;
            overflow-wrap: break-word;
            max-width: 100%;
        }

        .ia-response p {
            margin: 8px 0;
            line-height: 1.5;
            overflow-wrap: break-word;
            text-align: left; /* Alinha parágrafos à esquerda */
        }

        .ia-response ul {
            margin: 8px 0;
            padding-left: 20px;
            max-width: 100%;
            overflow-wrap: break-word;
            text-align: left; /* Alinha listas à esquerda */
        }

        .ia-response li {
            color: #e0e0e0; /* Garante que os itens da lista sejam brancos */
            margin-bottom: 4px;
        }

        .copy-button {
            position: absolute;
            top: 8px;
            right: 8px;
            background: transparent;
            border: none;
            border-radius: 4px;
            padding: 4px 6px;
            cursor: pointer;
            font-size: 0;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.15s ease;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
        }
        .copy-button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
        }
        .copy-button svg {
            width: 16px;
            height: 16px;
        }
        .copy-button.copied {
            background: rgba(76, 175, 80, 0.2);
            color: rgba(149, 255, 170, 0.95);
        }
        .copy-button.copy-error {
            background: rgba(244, 67, 54, 0.2);
            color: rgba(255, 138, 128, 0.95);
        }



        code {
            z-index: 1;
        }

        .question-text {
            position: relative;
            display: block;
            text-align: left;
            padding: 3px 0;
            border-radius: 5px;
            transition: background-color 0.3s;
            cursor: pointer;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .question-text:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .question-text:hover .edit-icon {
            display: inline-block;
        }

        .edit-icon {
            display: none;
            margin-left: 8px;
            font-size: 14px;
            opacity: 0.7;
        }

        .edit-input, .edit-textarea {
            width: 100%;
            background-color: rgba(50, 50, 50, 0.9);
            color: #fff; /* Ajuste para uma cor visivel */
            border: 2px solid #4CAF50; /* Cor mais agradavel */
            border-radius: 5px;
            padding: 10px;
            font-family: "Source Code Pro", monospace;
            font-weight: normal;
            font-style: italic;
            font-size: 16px;
            resize: none;
            outline: none;
            margin-bottom: 20px;
            transition: box-shadow 0.3s, border-color 0.3s;
        }

        .edit-input:focus, .edit-textarea:focus {
            box-shadow: 0 0 10px #4CAF50;
            border-color: #81c784;
        }

        .edit-textarea {
            min-height: 120px;
            white-space: pre-wrap;
        }

        /* ============ MANUAL INPUT (estilo terminal) ============
           Usado quando o usuario digita pergunta manual via Ctrl+I ou
           clicando na tela. Visual de prompt de terminal: prefixo '>' verde,
           cursor '_' piscando, fundo igual ao app (sem destaque verde),
           altura compacta com auto-grow.
        */
        .terminal-input-wrap {
            position: relative;
            background: rgba(20, 20, 22, 0.95);
            border: 1px solid #2a2a2e;
            border-radius: 6px;
            padding: 8px 10px 8px 24px;
            font-family: "Source Code Pro", "JetBrains Mono", monospace;
            font-size: 15px;
            color: #e6e6e6;
            transition: border-color 0.15s ease;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
            box-sizing: border-box;
        }
        .terminal-input-wrap:focus-within {
            border-color: #4a4a52;
        }
        .terminal-input-wrap::before {
            content: '>';
            position: absolute;
            left: 9px;
            top: 8px;
            color: #5fd75f;
            font-weight: bold;
            user-select: none;
            pointer-events: none;
            line-height: 1.4;
            font-size: 15px;
            font-family: inherit;
        }
        /* contenteditable: cursor '_' real fica DEPOIS do texto, sem replicacao. */
        .terminal-input {
            display: block;
            min-height: 22px;
            max-height: 200px;
            overflow-y: auto;
            background: transparent;
            border: none;
            outline: none;
            color: #e6e6e6;
            font: inherit;
            line-height: 1.4;
            padding: 0;
            margin: 0;
            text-align: left; /* herda center de algum pai — forca esquerda */
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-wrap: break-word;
            caret-color: transparent; /* nativo escondido — _ DOM e' o cursor */
            scrollbar-width: thin;
        }
        .terminal-input::selection { background: rgba(95, 215, 95, 0.3); }
        .terminal-input .gcursor {
            color: #5fd75f;
            font-weight: bold;
            animation: terminal-blink 1.05s steps(2, start) infinite;
            user-select: none;
        }
        @keyframes terminal-blink {
            0%, 50% { opacity: 1; }
            50.01%, 100% { opacity: 0; }
        }
        .terminal-hint {
            position: absolute;
            left: 38px;
            top: 8px;
            color: #6a6a72;
            font-size: 14px;
            font-style: normal;
            font-family: inherit;
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
            opacity: 0.7;
            line-height: 1.4;
        }
        .terminal-input-wrap.has-text .terminal-hint { display: none; }

        .edit-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: flex-start;

        .manual-input-container {

            margin-bottom: 16px;
        }

        .send-button {
            background: #4CAF50;
            border: none;
            border-radius: 5px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: white;
            font-weight: bold;
            transition: background 0.3s;
        }

        .send-button:hover {
            background: #45a049;
        }

        .ocr-left {
            text-align: left !important;
        }

        /* Streaming cursor animation */
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background-color: #00ff00;
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0;
            }
        }

        .streaming-response {
            font-family: "Source Code Pro", monospace;

            font-weight: bold;
            line-height: 1.5;

        /* Toast notification */

            background-color: rgba(76, 175, 80, 0.95);
            color: white;
            padding: 12px 24px;

            pointer-events: none;
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* === Workspace bar (inline, clipe + chips) === */
        .ws-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px;
            margin-top: 4px;
            background-color: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 5px;
            flex-wrap: wrap;
            min-height: 26px;

        .ws-clip-btn {
            width: 22px;
            height: 22px;
            padding: 0;

            align-items: center;
            justify-content: center;

        .ws-chips {

        .ws-chip {

        /* Linha discreta de evento de arquivo (criado/editado/etc) */
        .ws-file-event {

        /* Cursor pointer em blocos de código */
        .ia-response pre code,

            white-space: pre;
            overflow-wrap: normal;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .ia-response pre code:hover,
        .streaming-response pre code:hover {
            background-color: rgba(100, 100, 100, 0.3);
        }

        /* Cursor pointer em código inline */
        .ia-response code:not(pre code),
        .streaming-response code:not(pre code) {
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .ia-response code:not(pre code):hover,
        .streaming-response code:not(pre code):hover {
            background-color: rgba(100, 100, 100, 0.5);
        }

        .copy-button:active {

        .agentic-stop-btn {

        }

        .agentic-debug-block {

        /* === Assistente de Tradução — indicador ao vivo (sem texto, só animação) === */
        #ta-live-indicator {
            display: none;
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 9991;
            width: 45px;
            height: 45px;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #ta-live-indicator.visible { display: flex; }
        #ta-live-indicator.hidden-by-loader { opacity: 0; }

        /* Barra de volume (mic/sys) — embaixo da bolinha do live. Mostra se está
           captando áudio: verde quando acima do limiar de silêncio. */
        #ta-volume {
            display: none;
            position: fixed;
            top: 62px;
            right: 10px;
            z-index: 9991;
            width: 78px;

        #ta-volume .ta-vol-row { display: flex; align-items: center; gap: 4px; margin-top: 3px; }

        #ta-volume .ta-vol-track { flex: 1; height: 6px; background: rgba(255,255,255,0.12); border-radius: 3px; overflow: hidden; }
        #ta-volume .ta-vol-fill { width: 0%; height: 100%; background: #4a4a4a; border-radius: 3px; transition: width 80ms linear, background 120ms; }
        #ta-volume .ta-vol-fill.active { background: #00e676; }

        /* Palavras-chave (negrito) em destaque: maiores + cor de realce. Vale pro
           Realtime (.rt-assistant-text) e pro Tradutor (.ia-response) — pra bater o
           olho nos termos que o recrutador quer ouvir. */
        .rt-assistant-text strong, .ia-response strong {
            font-size: 1.18em;
            font-weight: 700;
            color: #7CFFB0;
            letter-spacing: 0.2px;
        }

        /* Selo pequeno: resposta usou a base de conhecimento */
        .kb-used-badge {
            font-size: 10px;
            color: #7CFFB0;
            opacity: 0.85;
            margin-bottom: 5px;
            font-style: italic;
        }

        /* Loading "processando" — robôzinho pulando (robot.gif), pequeno, embaixo das barras */
        #ta-loading {
            display: none;
            position: fixed;
            top: 96px;
            right: 29px;
            z-index: 9991;
            width: 40px;
            height: 40px;
            pointer-events: none;
        }

        /* Pulsating circle (mic aberto) — 15×15, animação lenta */
        #ta-live-pulse { display: none; position: relative; width: 15px; height: 15px; }
        #ta-live-indicator.state-mic #ta-live-pulse { display: block; }
        #ta-live-pulse:before {
            content: '';
            position: relative;
            display: block;
            width: 300%;
            height: 300%;
            box-sizing: border-box;
            margin-left: -100%;
            margin-top: -100%;
            border-radius: 45px;
            background-color: #01a4e9;
            animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        #ta-live-pulse:after {
            content: '';
            position: absolute;
            left: 0; top: 0;
            display: block;
            width: 100%; height: 100%;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 0 8px rgba(0,0,0,.3);
            animation: pulse-dot 2.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) -.4s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(.33); }
            80%, 100% { opacity: 0; }
        }
        @keyframes pulse-dot {
            0% { transform: scale(.8); }
            50% { transform: scale(1); }
            100% { transform: scale(.8); }
        }
        .ta-meta {
            font-size: 11px;

        .ta-original {

            color: #a8e6a3;
        }
